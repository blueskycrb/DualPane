name: Tag Release

# Manual helper: bump is done via git tag + GitHub Release UI,
# or: gh release create v1.0.0 --generate-notes
# The build.yml workflow attaches the .deb when a release is published.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag, e.g. v1.0.0"
        required: true
        default: "v1.0.0"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "DualPane $VERSION" \
            --generate-notes \
            --latest
          # build.yml (on: release) will build and attach the .deb
