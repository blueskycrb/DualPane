name: Build DualPane

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Theos roothide arm64e package
    runs-on: macos-14
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Prefer a recent Xcode; fall back gracefully
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_15.3.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun --show-sdk-path --sdk iphoneos

      - name: Install build tools
        run: |
          brew list ldid &>/dev/null || brew install ldid
          brew list make &>/dev/null || brew install make
          # dpkg for packaging .deb (Theos package step)
          brew list dpkg &>/dev/null || brew install dpkg

      - name: Install Theos
        run: |
          # roothide/theos scans plists with `od | head`; pipefail turns
          # macOS od's expected SIGPIPE into a packaging failure.
          set -eu
          git clone --depth=1 --recurse-submodules https://github.com/roothide/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"
          echo "$HOME/theos/bin" >> "$GITHUB_PATH"
          # Confirm
          ls "$HOME/theos/makefiles/common.mk"
          "$HOME/theos/bin/nic.pl" --version || true

      - name: Build package
        env:
          THEOS: ${{ env.THEOS }}
        run: |
          set -euo pipefail
          export THEOS="${THEOS:-$HOME/theos}"
          echo "THEOS=$THEOS"
          echo "SDK: $(xcrun --show-sdk-path --sdk iphoneos)"
          # FINALPACKAGE=1 → release strip + proper packaging
          gmake package FINALPACKAGE=1 -j"$(sysctl -n hw.ncpu)"

          deb="$(find packages -maxdepth 1 -type f -name '*.deb' -print -quit)"
          test -n "$deb"
          version="$(dpkg-deb -f "$deb" Version)"
          test "$(dpkg-deb -f "$deb" Architecture)" = "iphoneos-arm64e"
          output="packages/DualPane_${version}_arm64e_roothide.deb"
          mv "$deb" "$output"

          extract_dir="$(mktemp -d)"
          dpkg-deb -x "$output" "$extract_dir"

          # RootHide packages use the roothide /var/jb staging prefix. The
          # installed path is remapped by Bootstrap to its current jbroot.
          test -f "$extract_dir/var/jb/Library/MobileSubstrate/DynamicLibraries/DualPane.dylib"
          test -f "$extract_dir/var/jb/Library/PreferenceBundles/DualPanePrefs.bundle/DualPanePrefs"

          found_macho=0
          while IFS= read -r candidate; do
            if archs="$(lipo -archs "$candidate" 2>/dev/null)"; then
              found_macho=1
              echo "$(basename "$candidate") architectures: $archs"
              [[ "$archs" == "arm64e" ]]
            fi
          done < <(find "$extract_dir" -type f)
          [[ "$found_macho" -eq 1 ]]

          echo "---- packages ----"
          ls -lah packages/

      - name: Attach deb to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
